<!-- ORCHID CONTINUUM ATLAS — WITH INTELLIGENCE PANEL -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orchid Continuum Atlas</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:#e8eefc;
}

.wrap { padding:20px; max-width:1400px; margin:auto; }

.panel {
  background:#121a2b;
  border:1px solid #27324a;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}

button {
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:#4ea1ff;
  color:white;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:16px;
}

.card {
  background:#0f1828;
  border:1px solid #27324a;
  border-radius:12px;
  padding:10px;
}

.small { color:#9fb0d6; font-size:13px; }

</style>
</head>

<body>
<div class="wrap">

<h1>Orchid Continuum Atlas</h1>

<div class="panel">
API:
<input id="api" value="https://orchid-continuum-control-panel.onrender.com" style="width:60%">
<select id="scope">
<option value="country">country</option>
<option value="continent">continent</option>
</select>
<input id="value" value="Ecuador">
<button onclick="loadAll()">Load</button>
</div>

<div class="grid">

<div>
<div class="panel">
<h2 id="title">Loading...</h2>
<div id="desc"></div>
</div>

<div class="panel">
<h3>Habitats</h3>
<div id="habitats"></div>
</div>

<div class="panel">
<h3>Orchids</h3>
<div id="orchids"></div>
</div>
</div>

<div>

<div class="panel">
<h3>Region Intelligence</h3>
<div id="intel"></div>
</div>

</div>

</div>

</div>

<script>

function api() {
  return document.getElementById("api").value;
}

function q(id){ return document.getElementById(id); }

async function fetchJSON(url){
  const r = await fetch(url);
  return await r.json();
}

async function loadAll(){

  const scope = q("scope").value;
  const value = q("value").value;

  // PROFILE
  const profile = await fetchJSON(
    api()+"/api/orchid-widgets/region-profile?value="+value
  );

  const r = profile.region;

  q("title").innerText = r.region_name;
  q("desc").innerText = r.short_description;

  q("habitats").innerHTML = (r.habitats || []).map(h=>`
    <div class="card">
      <b>${h.habitat_name}</b>
      <div class="small">${h.habitat_description}</div>
    </div>
  `).join("");

  // ORCHIDS
  const orchids = await fetchJSON(
    api()+"/api/orchid-widgets/orchids-by-region?scope="+scope+"&value="+value
  );

  q("orchids").innerHTML = (orchids.orchids || []).map(o=>`
    <div class="card">
      ${o.display_name}
      <div class="small">${o.matched_value}</div>
    </div>
  `).join("");

  // INTELLIGENCE (NEW)
  try {
    const intel = await fetchJSON(
      api()+"/api/orchid-widgets/region-intelligence?scope="+scope+"&value="+value
    );

    const s = intel.summary;

    q("intel").innerHTML = `
      <div class="card">
        Species: ${s.species_count}<br>
        Occurrences: ${s.occurrence_count}<br>
        Genera: ${s.genus_count}<br>
        Endemic Proxy: ${s.endemic_proxy_species_count}<br>
        Top Genera: ${s.top_genera}
      </div>
    `;

  } catch(e) {
    q("intel").innerHTML = `<div class="small">No intelligence data yet</div>`;
  }

}

loadAll();

</script>

</body>
</html>
