<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Featured Orchid Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f4;
    }

    .widget-wrap {
      padding: 12px;
    }

    .widget-title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin: 8px 0 16px;
      color: #234123;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 10px 12px 14px;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #1f351f;
      font-style: italic;
    }

    .meta {
      font-size: 13px;
      color: #5b6f58;
      margin-bottom: 4px;
    }

    .count {
      font-size: 12px;
      color: #7a8b77;
    }

    .status {
      text-align: center;
      padding: 30px;
      color: #5b6f58;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="widget-wrap">
    <div class="widget-title">Featured Orchid Gallery</div>
    <div id="status" class="status">Loading orchids...</div>
    <div id="gallery" class="gallery"></div>
  </div>

  <script>
    const API_URL = "https://orchid-continuum-control-panel.onrender.com/api/orchid-widgets/featured-gallery?limit=12";

    async function loadGallery() {
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");

      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error("API request failed with status " + response.status);
        }

        const data = await response.json();

        if (!data.cards || !data.cards.length) {
          status.textContent = "No orchids were returned.";
          return;
        }

        status.style.display = "none";

        data.cards.forEach((item) => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${item.hero_image_url}" alt="${item.display_name}">
            <div class="card-body">
              <div class="name">${item.display_name}</div>
              <div class="meta">${item.genus} • ${item.family}</div>
              <div class="count">${item.image_count} images</div>
            </div>
          `;

          gallery.appendChild(card);
        });
      } catch (error) {
        status.textContent = "Failed to load orchid gallery.";
        console.error(error);
      }
    }

    loadGallery();
  </script>
</body>
</html>
