<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orchid Continuum Gallery</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
    }

    .atlas-btn {
      background: #2563eb;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-body {
      padding: 10px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="title">Orchid Continuum Gallery</div>

    <!-- ✅ Atlas Link -->
    <a href="atlas.html" class="atlas-btn">
      🌍 Open Atlas
    </a>
  </div>

  <div id="gallery" class="gallery"></div>

  <script>
    const API = "/api/orchid-widgets/featured-gallery?limit=12";

    async function loadGallery() {
      const res = await fetch(API);
      const data = await res.json();

      const grid = document.getElementById("gallery");

      grid.innerHTML = data.cards.map(c => `
        <div class="card">
          <img src="${c.hero_image_url}" />
          <div class="card-body">
            ${c.display_name}
          </div>
        </div>
      `).join('');
    }

    loadGallery();
  </script>

</body>
</html>
